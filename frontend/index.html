<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
                      <h1>Heap Visualizer</h1>
            <p>Enter elements and visualize min/max heap trees</p>
        </header>

        <main>
                  <section class="input-section">
                <div class="input-group">
                    <label for="elements">Enter Elements (comma-separated):</label>
                    <input type="text" id="elements" placeholder="e.g., 5,3,8,1,2,7">
                </div>
                
                <div class="heap-type">
                    <label>Heap Type:</label>
            <div class="radio-group">
                        <label>
                            <input type="radio" name="heapType" value="min" checked>
                            Min Heap
            </label>
                        <label>
                            <input type="radio" name="heapType" value="max">
                            Max Heap
                        </label>
                    </div>
                </div>
                
                <div class="button-group">
                    <button id="buildHeap">Build Heap</button>
                       <button id="clearAll">Clear All</button>
                </div>
            </section>

            <section class="visualization-section">
                <h2>Heap Tree Visualization</h2>
                <div id="treeContainer" class="tree-container">
                         <svg id="treeSvg" width="800" height="400"></svg>
                </div>
                
                <div class="heap-array">
                            <h3>Array Representation:</h3>
                    <div id="arrayDisplay" class="array-display"></div>
                </div>
            </section>

            <section class="operations-section">
                <h2>Heap Operations</h2>
                <div class="operation-controls">
                                   <div class="input-group">
                        <label for="newElement">Insert Element:</label>
                        <input type="number" id="newElement" placeholder="Enter number">
                        <button id="insertBtn">Insert</button>
                    </div>
                    
                    <div class="input-group">
                            <button id="extractBtn">Extract Root</button>
                        <button id="peekBtn">Peek Root</button>
                    </div>
                </div>
                
                <div id="operationResult" class="operation-result"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
